services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    working_dir: /app
    ports: ["8000:8000"]
  frontend:
    image: node:20
    working_dir: /app
    command: bash -lc "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./frontend:/app
    ports: ["3000:3000"]
    depends_on: [backend]
